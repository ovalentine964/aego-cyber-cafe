# ── Error & Clarification Messages ──
errors:
  not_understood:
    en: |
      😊 Sorry, I didn't understand that.

      Could you please:
      1️⃣ Type a number from the menu
      2️⃣ Or describe what you need in simple words

      Examples:
      • "I need a CV"
      • "KRA PIN"
      • "Print documents"

    sw: |
      😊 Samahani, sijaelewa vizuri.

      Tafadhali:
      1️⃣ Andika nambari kutoka kwenye menyu
      2️⃣ Au eleza unachohitaji kwa maneno rahisi

      Mifano:
      • "Nataka CV"
      • "KRA PIN"
      • "Nataka kuchapisha"

    luo: |
      😊 Mohoni, ok anangʼo gi kamano.

      Yien:
      1️⃣ Cochi nambari ma ok gi menyu
      2️⃣ Kata yien ihero angʼo gi wuoyo maber

      Nimiro:
      • "Nhero CV"
      • "KRA PIN"
      • "Nhero choopo"

  multiple_attempts:
    en: |
      😅 I'm having trouble understanding.

      Let me connect you with our staff — they'll help you right away!

      📞 Call: [phone number]
      🏪 Visit: Aego Cyber Cafe, Nyatike

      Or try again by typing:
      • "menu" — to see all services
      • "help" — for assistance

    sw: |
      😅 Ninashindwa kuelewa.

      Hebu nikupatie mmoja wa wafanyakazi wetu — atakusaidia mara moja!

      📞 Piga: [nambari ya simu]
      🏪 Kuja: Aego Cyber Cafe, Nyatike

      Au jaribu tena kwa kuandika:
      • "menyu" — kuona huduma zote
      • "msaada" — kwa msaada

  payment_failed:
    en: |
      ❌ Payment was not successful.

      This could be because:
      • Insufficient M-Pesa balance
      • You entered wrong PIN
      • Network issue

      Would you like to:
      1️⃣ Try payment again
      2️⃣ Pay later (visit the shop)
      3️⃣ Cancel this service

    sw: |
      ❌ Malipo hayajafanika.

      Hii inaweza kuwa kwa sababu:
      • Salio la M-Pesa halitoshi
      • Uliweka PIN mbaya
      • Tatizo la mtandao

      Je, ungependa:
      1️⃣ Jaribu malipo tena
      2️⃣ Lipa baadaye (kuja dukani)
      3️⃣ Futa huduma hii

